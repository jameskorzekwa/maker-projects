# Deployed 2026-07-24: MB7389 + WatangTech MPPT power + VBAT/CHRG/DONE monitoring.
esphome:
  name: snow-depth-sensor
  friendly_name: snow-depth-sensor
  on_boot:
    priority: -100
    then:
      - if:
          condition:
            switch.is_on: ota_mode_switch
          then:
            - deep_sleep.prevent: deep_sleep_control
      # Power the MB7389 through the Pololu #2810 and let it settle; it
      # free-runs (~6 Hz) for the rest of the wake window.
      - output.turn_on: maxbotix_power_enable
      - delay: 3s
      - wait_until:
          condition:
            api.connected:
          timeout: 15s

esp32:
  board: esp32dev
  framework:
    type: esp-idf

# Production logging: warnings/errors remain available over the API, while
# serial formatting/transmission is disabled to reduce awake-time overhead.
logger:
  level: WARN
  baud_rate: 0

# Enable Home Assistant API
api:
  encryption:
    key: !secret snow_depth_sensor_api_encryption_key

ota:
  - platform: esphome
    password: !secret snow_depth_sensor_ota_password
    on_begin:
      then:
        - deep_sleep.prevent: deep_sleep_control

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  power_save_mode: HIGH

# MB7389 free-running TTL serial input (verified 2026-07-22: pin 5 idles
# HIGH ~5 V = true TTL, standard non-inverted UART; 10k/20k divider to 3.3 V).
# The debug hook is the frame parser: dummy_receiver consumes the bytes and
# the sequence lambda decodes each "Rdddd\r" frame (dddd = mm; 5000 = no
# target). The hook fires regardless of log level.
uart:
  id: uart_a
  rx_pin: GPIO32
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 1
  debug:
    direction: RX
    dummy_receiver: true
    debug_prefix: "[MB7389 UART] "
    after:
      delimiter: "\r"
    sequence:
      - lambda: |-
          for (size_t i = 0; i + 6 <= bytes.size(); i++) {
            if (bytes[i] != 'R' || bytes[i + 5] != '\r')
              continue;
            bool digits_ok = true;
            for (int j = 1; j <= 4; j++) {
              if (bytes[i + j] < '0' || bytes[i + j] > '9') { digits_ok = false; break; }
            }
            if (!digits_ok)
              continue;
            const int mm = (bytes[i + 1] - '0') * 1000
                         + (bytes[i + 2] - '0') * 100
                         + (bytes[i + 3] - '0') * 10
                         + (bytes[i + 4] - '0');
            if (mm < 300 || mm >= 5000) {
              // 300 = min-range clamp boundary, 5000 = no target detected.
              i += 5;
              continue;
            }
            id(a02yyuw_distance).publish_state((float) mm);
            i += 5;
          }

# GPIO26 drives the Pololu #2810 ON pin, switching MB7389 power. The 100k
# pulldown turns the sensor off when the ESP32 deep-sleeps.
output:
  - platform: gpio
    pin: GPIO26
    id: maxbotix_power_enable

# WatangTech MPPT board charge-status taps, wired through 10 kOhm series
# resistors to the reclaimed ATOM Echo audio pins (G19/G22 drive only the
# unused NS4168 amplifier inputs; speaker removed). Signals are open-drain
# from the CN3791 charger: active low. They update during wake windows; HA
# holds the last state through deep sleep.
binary_sensor:
  - platform: gpio
    name: "Snow Sensor Charging"
    device_class: battery_charging
    pin:
      number: GPIO19
      mode:
        input: true
        pullup: true
      inverted: true

  - platform: gpio
    name: "Snow Sensor Charge Complete"
    icon: "mdi:battery-check"
    pin:
      number: GPIO22
      mode:
        input: true
        pullup: true
      inverted: true

switch:
  # Persistent device-owned maintenance mode. Turn this on during any 60-second
  # wake window; it prevents sleep immediately and remains on across reboots.
  - platform: template
    name: "Snow Sensor OTA Mode"
    id: ota_mode_switch
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - deep_sleep.prevent: deep_sleep_control
    turn_off_action:
      - deep_sleep.allow: deep_sleep_control

deep_sleep:
  id: deep_sleep_control
  run_duration: 60s
  sleep_duration: 15min

sensor:
  # MB7389 distance, published by the UART parser above. The A02YYUW name and
  # ID are intentionally preserved so the existing Home Assistant entity,
  # history, and snow-depth helpers survive the conversion.
  - platform: template
    name: "A02YYUW Distance"
    id: a02yyuw_distance
    unit_of_measurement: "mm"
    device_class: distance
    state_class: measurement
    accuracy_decimals: 0
    update_interval: never
    force_update: true
    filters:
      - median:
          window_size: 5
          send_every: 5
          send_first_at: 5

  # Battery voltage via the WatangTech VBAT port through a 100k/100k divider
  # into GPIO33 (ADC1_CH5, reclaimed audio pin). The MAX17043 fuel gauge was
  # removed 2026-07-24. Names match the old entities so HA history survives.
  # Calibration: compare against a multimeter and adjust the multiply factor.
  - platform: adc
    pin: GPIO33
    id: vbat_adc
    name: "Snow Sensor Battery Voltage"
    attenuation: 12db
    update_interval: 5s
    accuracy_decimals: 2
    filters:
      - multiply: 2.0
      - median:
          window_size: 5
          send_every: 5
          send_first_at: 5

  # Voltage-curve percentage estimate. Less sophisticated than the removed
  # fuel gauge: reads low under wake-window load, high while charging. Use
  # "Snow Sensor Charge Complete" (DONE pin) as the reliable full indicator.
  - platform: copy
    source_id: vbat_adc
    name: "Snow Sensor Battery"
    unit_of_measurement: "%"
    device_class: battery
    accuracy_decimals: 0
    filters:
      - calibrate_linear:
          method: exact
          datapoints:
            - 3.30 -> 0.0
            - 3.50 -> 5.0
            - 3.60 -> 13.0
            - 3.70 -> 30.0
            - 3.80 -> 55.0
            - 3.90 -> 72.0
            - 4.00 -> 85.0
            - 4.10 -> 95.0
            - 4.20 -> 100.0
      - clamp:
          min_value: 0.0
          max_value: 100.0
