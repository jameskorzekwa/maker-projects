# Low-power production configuration (deployed 2026-07-20).
# Wake 60 s -> sample burst -> deep sleep 15 min.
esphome:
  name: snow-depth-sensor
  friendly_name: snow-depth-sensor
  on_boot:
    priority: -100
    then:
      - if:
          condition:
            switch.is_on: ota_mode_switch
          then:
            - deep_sleep.prevent: deep_sleep_control
      # Give Wi-Fi/API time to connect, then collect a short burst of samples.
      - wait_until:
          condition:
            api.connected:
          timeout: 15s
      - repeat:
          count: 12
          then:
            - button.press: a02yyuw_trigger
            - delay: 3s

esp32:
  board: esp32dev
  framework:
    type: esp-idf

# Production logging: warnings/errors remain available over the API, while
# serial formatting/transmission is disabled to reduce awake-time overhead.
logger:
  level: WARN
  baud_rate: 0

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password
    on_begin:
      then:
        - deep_sleep.prevent: deep_sleep_control

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  power_save_mode: HIGH

uart:
  rx_pin: GPIO32
  baud_rate: 9600
  id: uart_a

# Shared 3.3 V I2C bus for the battery and solar monitors.
i2c:
  id: power_bus
  sda: GPIO21
  scl: GPIO25
  scan: true
  frequency: 100kHz

output:
  - platform: gpio
    pin: GPIO26
    id: a02yyuw_trigger_output

# This particular A02YYUW sensor/clone only emits a UART frame after a pulse
# on its control lead; the boot burst above requests the measurements.
button:
  - platform: output
    name: "Trigger Sensor"
    output: a02yyuw_trigger_output
    duration: 100ms
    id: a02yyuw_trigger

switch:
  # Persistent device-owned maintenance mode. Turn this on during any 60-second
  # wake window; it prevents sleep immediately and remains on across reboots.
  - platform: template
    name: "Snow Sensor OTA Mode"
    id: ota_mode_switch
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - deep_sleep.prevent: deep_sleep_control
    turn_off_action:
      - deep_sleep.allow: deep_sleep_control

deep_sleep:
  id: deep_sleep_control
  run_duration: 60s
  sleep_duration: 15min

sensor:
  - platform: "a02yyuw"
    name: "A02YYUW Distance"
    id: a02yyuw_distance
    uart_id: uart_a
    filters:
      - median:
          window_size: 5
          send_every: 5
          send_first_at: 5

  - platform: max17043
    i2c_id: power_bus
    update_interval: 20s
    battery_voltage:
      name: "Snow Sensor Battery Voltage"
      accuracy_decimals: 2
    battery_level:
      name: "Snow Sensor Battery"
      accuracy_decimals: 0

  - platform: ina219
    i2c_id: power_bus
    address: 0x40
    shunt_resistance: 0.1 ohm
    max_voltage: 16.0V
    max_current: 1.5A
    update_interval: 20s
    bus_voltage:
      name: "Snow Sensor Solar Voltage"
      accuracy_decimals: 2
    current:
      name: "Snow Sensor Solar Current"
      accuracy_decimals: 3
    power:
      name: "Snow Sensor Solar Input Power"
      accuracy_decimals: 2
    shunt_voltage:
      name: "Snow Sensor Solar Shunt Voltage"
      disabled_by_default: true
