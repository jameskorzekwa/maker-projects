esphome:
  name: snow-depth-sensor
  friendly_name: snow-depth-sensor
  on_boot:
    priority: -100
    then:
      # Temporary diagnostic mode keeps the node awake for UART observation.
      - deep_sleep.prevent: deep_sleep_control
      - wait_until:
          condition:
            api.connected:
          timeout: 15s

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  level: DEBUG
  baud_rate: 115200

api:
  encryption:
    key: !secret snow_depth_sensor_api_encryption_key

ota:
  - platform: esphome
    password: !secret snow_depth_sensor_ota_password
    on_begin:
      then:
        - deep_sleep.prevent: deep_sleep_control

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  power_save_mode: NONE

uart:
  rx_pin: GPIO32
  baud_rate: 9600
  id: uart_a
  debug:
    direction: RX
    dummy_receiver: false
    debug_prefix: "[A02 UART] "
    after:
      bytes: 4

i2c:
  id: power_bus
  sda: GPIO21
  scl: GPIO25
  scan: true
  frequency: 100kHz

output:
  - platform: gpio
    pin: GPIO26
    id: a02_trigger_output

button:
  - platform: output
    name: "Trigger Sensor"
    output: a02_trigger_output
    duration: 100ms
    id: a02_trigger

interval:
  - interval: 1s
    startup_delay: 1s
    then:
      - button.press: a02_trigger

switch:
  - platform: template
    name: "Snow Sensor OTA Mode"
    id: ota_mode_switch
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - deep_sleep.prevent: deep_sleep_control
    turn_off_action:
      - deep_sleep.allow: deep_sleep_control

deep_sleep:
  id: deep_sleep_control
  run_duration: 60s
  sleep_duration: 15min

sensor:
  - platform: a02yyuw
    name: "A02YYUW Distance"
    id: a02_distance
    uart_id: uart_a
    force_update: true
    on_raw_value:
      then:
        - logger.log:
            level: DEBUG
            format: "A02 distance: %.2f in (%.0f mm raw)"
            args: ["x / 25.4f", "x"]

  - platform: max17043
    i2c_id: power_bus
    update_interval: 20s
    battery_voltage:
      name: "Snow Sensor Battery Voltage"
      accuracy_decimals: 2
    battery_level:
      name: "Snow Sensor Battery"
      accuracy_decimals: 0

  - platform: ina219
    i2c_id: power_bus
    address: 0x40
    shunt_resistance: 0.1 ohm
    max_voltage: 16.0V
    max_current: 1.5A
    update_interval: 20s
    bus_voltage:
      name: "Snow Sensor Solar Voltage"
      accuracy_decimals: 2
    current:
      name: "Snow Sensor Solar Current"
      accuracy_decimals: 3
    power:
      name: "Snow Sensor Solar Input Power"
      accuracy_decimals: 2
    shunt_voltage:
      name: "Snow Sensor Solar Shunt Voltage"
      disabled_by_default: true
