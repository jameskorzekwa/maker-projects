substitutions:
  display_name: lux-sensor-1

esphome:
  name: ${display_name}
  platformio_options:
    board_build.mcu: esp32c3
    board_build.variant: esp32c3
    # Prevent boot loops when flashing a modern binary over serial.
    board_build.flash_mode: dio

esp32:
  variant: ESP32C3
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
  encryption:
    key: !secret api_encryption_key

logger:

ota:
  - platform: esphome
    password: !secret ota_password

binary_sensor:
  - platform: status
    name: "Lux Sensor Status"

i2c:
  sda: 6
  scl: 7
  scan: false

sensor:
  - platform: wifi_signal
    name: "Light Level WiFi Signal"
    id: os_ll
    update_interval: 15s
    filters:
      - sliding_window_moving_average:
          window_size: 15
          send_every: 15
          send_first_at: 1

  - platform: bh1750
    name: "Light Level"
    address: 0x23
    update_interval: 1s
    filters:
      - sliding_window_moving_average:
          window_size: 10
          send_every: 10
          send_first_at: 1
      - or:
          - throttle: 60s
          - delta: 5

switch:
  - platform: restart
    name: "Lux Sensor Restart"
