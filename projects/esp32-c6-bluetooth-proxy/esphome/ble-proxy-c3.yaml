substitutions:
  name: ble-proxy-c3
  friendly_name: Bluetooth Proxy C3

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  platformio_options:
    board_build.mcu: esp32c3
    board_build.variant: esp32c3
    # Retained from the live C3 configuration to prevent serial-flash boot loops.
    board_build.flash_mode: dio

esp32:
  board: esp32-c3-devkitm-1
  variant: ESP32C3
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_BT_BLE_50_FEATURES_SUPPORTED: y
      CONFIG_BT_BLE_42_FEATURES_SUPPORTED: y
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "10"

logger:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Bluetooth Proxy C3 Fallback"
    password: !secret fallback_ap_password

captive_portal:

esp32_ble:
  max_connections: 5

esp32_ble_tracker:
  scan_parameters:
    interval: 300ms
    window: 300ms
    active: true

bluetooth_proxy:
  active: true
  connection_slots: 5
