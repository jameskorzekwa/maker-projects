<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">Bluetooth proxy system overview</title>
  <desc id="desc">A plug-in ESP32-C6 proxy relays Bluetooth devices over Wi-Fi to Home Assistant.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#52606d"/></marker>
    <style>.box{fill:#f5f7fa;stroke:#334e68;stroke-width:3}.accent{fill:#d9e2ec;stroke:#334e68;stroke-width:3}.label{font:600 20px system-ui,sans-serif;fill:#102a43}.sub{font:16px system-ui,sans-serif;fill:#486581}.line{stroke:#52606d;stroke-width:4;fill:none;marker-end:url(#arrow)}</style>
  </defs>
  <rect width="960" height="360" rx="24" fill="#ffffff"/>
  <rect class="box" x="42" y="104" width="220" height="150" rx="18"/>
  <circle cx="94" cy="164" r="18" fill="#9fb3c8"/><circle cx="150" cy="164" r="18" fill="#9fb3c8"/><circle cx="206" cy="164" r="18" fill="#9fb3c8"/>
  <text class="label" x="152" y="210" text-anchor="middle">BLE devices</text>
  <text class="sub" x="152" y="234" text-anchor="middle">sensors, locks, buttons</text>
  <path class="line" d="M270 180 H362"/>
  <text class="sub" x="316" y="162" text-anchor="middle">BLE</text>
  <rect class="accent" x="370" y="66" width="250" height="228" rx="24"/>
  <rect x="412" y="105" width="166" height="86" rx="12" fill="#ffffff" stroke="#334e68" stroke-width="3"/>
  <path d="M445 143 h100 M445 160 h74" stroke="#829ab1" stroke-width="5"/>
  <path d="M490 224 q20-22 40 0 M478 213 q32-38 64 0 M466 201 q44-54 88 0" fill="none" stroke="#334e68" stroke-width="5" stroke-linecap="round"/>
  <text class="label" x="495" y="270" text-anchor="middle">Plug-in XIAO ESP32-C6</text>
  <path class="line" d="M628 180 H720"/>
  <text class="sub" x="674" y="162" text-anchor="middle">Wi-Fi</text>
  <rect class="box" x="728" y="104" width="190" height="150" rx="18"/>
  <path d="M775 158 h96 v60 h-96z M762 158 l61-38 61 38" fill="#d9e2ec" stroke="#334e68" stroke-width="3"/>
  <text class="label" x="823" y="238" text-anchor="middle">Home Assistant</text>
  <text class="sub" x="480" y="334" text-anchor="middle">Rated local AC mains to isolated 5 V DC inside enclosure</text>
</svg>
